<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sixieme Terre</title>
    <link rel="stylesheet" href="src/css/main.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="icon" href="src/assets/avatarka_faux.png" type="image/png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v6.5.1/css/all.css">
    <link href='https://unpkg.com/css.gg@2.0.0/icons/css/all.css' rel='stylesheet'>
</head>
<body class="page-map">
    
<!-- Левая панель инструментов -->
<div class="left-tools">
    <button id="sidebar-toggle" class="left-tool-btn" title="Меню">
        <span class="material-icons">menu</span>
    </button>
    <button id="layers-toggle" class="left-tool-btn" title="Слои">
        <span class="material-icons">layers</span>
    </button>
    <button id="markers-toggle" class="left-tool-btn" title="Маркеры">
        <span class="material-icons">place</span>
    </button>
    <button id="filters-toggle" class="left-tool-btn" title="Фильтры">
        <span class="material-icons">filter_list</span>
    </button>
    <button id="fullscreen-btn" class="left-tool-btn" title="Полноэкранный режим">
        <span class="material-icons">fullscreen</span>
    </button>
    <button id="coords-toggle" class="left-tool-btn" title="Координаты">
        <span class="material-icons">gps_fixed</span>
    </button>
</div>

<!-- Панели, которые выезжают (каждая только одна!) -->
<div id="layers-panel" class="tool-panel">
    <div class="filter-section">
        <h4>Слои карты</h4>
        <div class="layer-controls">
            <button class="layer-btn active" data-layer="political">Политическая</button>
            <button class="layer-btn" data-layer="geographic">Географическая</button>
            <button class="layer-btn" data-layer="trade">Торговая</button>
            <button class="layer-btn" data-layer="resources">Ресурсы</button>
        </div>
    </div>
</div>

<div id="markers-panel" class="tool-panel">
    <div class="filter-section">
        <h4>Маркеры</h4>
        <div id="marker-filters"></div>
    </div>
</div>

<div id="filters-panel" class="tool-panel">
    <!-- Сюда динамически будут подгружаться фильтры -->
</div>

<div id="coords-panel" class="tool-panel">
    <div class="filter-section">
        <h4>Координаты</h4>
        <p id="coords-display" style="font-family: 'Courier New', monospace; font-size: 1.1rem; margin: 8px 0;">
            X: 0, Y: 0
        </p>
        <button id="coords-mode-toggle" class="wiki-link" style="width: 100%; text-align: center; margin-bottom: 6px;">
            Выкл
        </button>
        <button id="copy-coords-btn" class="wiki-link" style="width: 100%; text-align: center;">
            Копировать
        </button>
        <button id="clear-crosshair-btn" class="wiki-link" style="width: 100%; text-align: center; margin-top: 6px;">
            Сброс
        </button>
    </div>
</div>

    
    <!-- Панель Хода и Сезона (правый верхний угол) -->
     <div class="turn-info">
        <span>Ход: <span id="turn-number">1</span></span>
        <span>Сезон: <span id="season-name">Весна</span></span>
    </div>
    
    <!-- Боковая панель -->
    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h3>Навигация</h3>
            <button id="sidebar-close" class="sidebar-close">
                <span class="material-icons">close</span>
            </button>
        </div>
        <div class="sidebar-content">
                <div class="sidebar-footer">
                    <a href="index.html" class="sidebar-link">🏠 На главную</a>
                    <a href="wiki.html" class="sidebar-link">📖 Вики</a>
                    <a href="stats.html" class="sidebar-link">📊 Статистика</a>
                    <a href="settings.html" class="sidebar-link">⚙️ Настройки</a>
                    <a href="admin.html" class="sidebar-link">🔧 Админка</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Контейнер карты -->
    <div id="map"></div>

    <!-- Нижняя панель (только список провинций) -->
    <div class="bottom-panel">
        <div class="legend-section">
        <h4>Условные обозначения</h4>
        <div class="legend-content-static">
            <!-- здесь будет статическая легенда -->
            <p>Список стран:</p>
            <p>Ресурсы:</p>
            <p>Религии:</p>
            <p>Расы:</p>
            <p>Иконки:</p>
        </div>
    </div>
    <div class="bottom-tabs">
        <button id="bottom-provinces-btn" class="bottom-tab-btn active">
            <span class="material-icons">format_list_bulleted</span> Список провинций
        </button>
    </div>
    <div id="bottom-provinces-content" class="bottom-content visible">
        <div id="province-list-panel-bottom"></div>
    </div>
</div>

    <!-- Информационная панель -->
    <div id="info-panel" class="info-panel" style="display: none;"></div>
    <!-- Кнопка вызова нижней панели -->
     <button id="bottom-toggle" class="bottom-toggle">
        <span class="material-icons">arrow_downward</span>
     </button>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="src/js/main.js"></script>
</body>
</html>

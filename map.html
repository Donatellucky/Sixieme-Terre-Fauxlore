<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Sixieme Terre</title>
        <link rel="stylesheet" href="src/css/main.css">
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
        <link rel="icon" href="src/assets/avatarka_faux.png" type="image/png">
      
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    
</head>
    <body class="page-map">
        <button id="sidebar-toggle" class="sidebar-toggle">☰</button>
        <!-- Мини-шапка: только логотип и ссылка на главную -->
        <div class="map-header">
            <p class="site-subtitle">Fauxlore Interactive</p>
            <a href="index.html" class="back-link">На главную</a>
        </div>

        <!-- Панель переключения слоёв (вертикальная) -->
         <div class="layer-controls">
            <button class="layer-btn active" data-layer="political">Политическая</button>
            <button class="layer-btn" data-layer="geographic">Географическая</button>
            <button class="layer-btn" data-layer="trade">Торговая</button>
            <button class="layer-btn" data-layer="resources">Ресурсы</button>
        </div>

        <!-- Заглушки для будущих панелей (список провинций, легенда) -->
        <div class="info-panel-placeholder" id="province-list-panel">
            <h3>Список провинции</h3>
            <div class="placeholder-content">(скоро здесь будет список)</div>
        </div>
        <div class="legend-placeholder" id="legend-panel">
            <h3>Условные обозначения</h3>
            <div class="placeholder-content">(скоро будет легенда)</div>
        </div>
        <div id="info-panel" class="info-panel" style="display: none;">
        </div>

          <!-- Контейнер карты -->
           <div id="map"></div>

           <!-- Панель с вкладками -->
            <div id="sidebar" class="sidebar">
                <div class="sidebar-header">
                    <h3>Управление картой</h3>
                    <button id="sidebar-close">✖</button>
                </div>
                <div class="sidebar-content">
                    <div class="filter-section">
                        <h4>Маркеры</h4>
                        <div id="marker-filters">
                             <!-- сюда динамически добавим чекбоксы -->
                        </div>
                    </div>
                    <div class="filter-section">
                        <h4>Провинции</h4>
                        <div id="placeholder">Список провинции (скоро)</div>
                    </div>
                    <div class="filter-section">
                        <h4>Легенда</h4>
                        <div class="placeholder">Условные обозначения (скоро)</div>
                    </div>
                </div>
            </div>

        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
        <script type="module" src="src/js/main.js"></script>
    </body>
</html>
